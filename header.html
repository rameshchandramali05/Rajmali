<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- <meta name="viewport" content="width=device-width, initial-scale=1"> -->
  
  <!-- Bootstrap CSS only -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .carousel-container {
      width: 100%;
      margin: 0;
      overflow: hidden;
      position: relative;
    }
    .carousel-slide {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .carousel-slide img {
      width: 100%;
      height: auto;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
    .carousel-slide img.active {
      opacity: 1;
      position: relative;
    }

    /* Buttons - Desktop look */
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.4); /* हल्का transparent white */
      color: #000;
      border: none;
      padding: 12px 16px;
      cursor: pointer;
      z-index: 2;
      transition: 0.3s;
    }
    .carousel-btn.prev {
      left: 0;
      border-radius: 0 50% 50% 0; /* half-circle */
    }
    .carousel-btn.next {
      right: 0;
      border-radius: 50% 0 0 50%;
    }
    .carousel-btn:hover {
      background: rgba(255,255,255,0.8);
    }

    /* Mobile look → transparent only arrows */
    @media (max-width: 768px) {
      .carousel-btn {
        background: none !important;  /* remove bg */
        color: white;                 /* arrow white */
        font-size: 24px;              /* bigger arrow */
        padding: 6px;                 /* compact */
      }
    }

    /* Dots */
    .carousel-dots {
      position: absolute;
      bottom: 15px;   
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 2;
    }
    .carousel-dots button {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.6);
      cursor: pointer;
    }
    .carousel-dots button.active {
      background: white;
    }
    @media (max-width: 768px) {
      .carousel-dots button { width: 10px; height: 10px; }
    }
  </style>
</head>
<body>

<div class="carousel-container" id="myCarousel">
  <div class="carousel-slide">
    <img src="https://drive.google.com/thumbnail?id=13vFdNti3Ndyjfgi2ALiCYbsjPQwnd8I5&sz=w1000" class="active h-150" alt="Mali Mananda">

  </div>
  


<!-- https://drive.google.com/file/d/1XxFKopkDvFsBpFm2hoZ3KP31hR_WNGia/view?usp=drive_link -->
  <!-- https://drive.google.com/file/d/10ifVGNXiFwzylRuEt1sMhjvKZXA_xJPG/view?usp=drive_link -->
  <!-- Buttons -->
  <button class="carousel-btn prev fs-5">&#10094;</button>
  <button class="carousel-btn next fs-5">&#10095;</button>

  <!-- Dots -->
  <div class="carousel-dots"></div>
</div>

<script>
  const slides = document.querySelectorAll('#myCarousel .carousel-slide img');
  const prevBtn = document.querySelector('#myCarousel .prev');
  const nextBtn = document.querySelector('#myCarousel .next');
  const dotsContainer = document.querySelector('#myCarousel .carousel-dots');
  
  let index = 0;
  let interval = setInterval(nextSlide, 3000); // Auto Slide (3 sec)

  // Create dots
  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    if (i === 0) dot.classList.add('active');
    dot.addEventListener('click', () => {
      index = i;
      showSlide();
      resetInterval();
    });
    dotsContainer.appendChild(dot);
  });
  const dots = dotsContainer.querySelectorAll('button');

  function showSlide() {
    slides.forEach((slide, i) => {
      slide.classList.remove('active');
      dots[i].classList.remove('active');
    });
    slides[index].classList.add('active');
    dots[index].classList.add('active');
  } 

  function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide();
  }
  function prevSlide() {
    index = (index - 1 + slides.length) % slides.length;
    showSlide();
  }

  nextBtn.addEventListener('click', () => { nextSlide(); resetInterval(); });
  prevBtn.addEventListener('click', () => { prevSlide(); resetInterval(); });

  function resetInterval() {
    clearInterval(interval);
    interval = setInterval(nextSlide, 3000);
  }

  // Pause on hover
  document.querySelector('#myCarousel').addEventListener('mouseenter', () => clearInterval(interval));
  document.querySelector('#myCarousel').addEventListener('mouseleave', () => resetInterval());
</script>

</body>
</html>

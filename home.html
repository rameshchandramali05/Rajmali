<section>

<div id="header"></div>
<div id="welcom"></div>
<div id="add"></div>
<div id="readmore"></div>
<div id="Func"></div>
<div id="sadasy"></div>

</section>

<script>
function load(file, id){
    fetch(file)
      .then(res => res.text())
      .then(html => {
          document.getElementById(id).innerHTML = html;
      });
}

load("header.html","header");
load("welcom.html","welcom");
load("add.html","add");
load("readmore.html","readmore");
load("Func.html","Func");
load("sadasy.html","sadasy");
</script>
